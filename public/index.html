<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barrido de Activos</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/form.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Barrido de Activos</h1>
      <a href="/lista.html" class="btn-link">Ver registros</a>
    </header>

    <div class="card">
      <form id="form" novalidate>

        <p class="section-title">Datos del colaborador</p>

        <div class="grid-2">
          <div class="field">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <div class="error-msg" id="err-nombre">Campo requerido</div>
          </div>
          <div class="field">
            <label for="cedula">Cédula</label>
            <input type="text" id="cedula" placeholder="10 dígitos" maxlength="10">
            <div class="error-msg" id="err-cedula">Debe tener exactamente 10 dígitos</div>
          </div>
        </div>

        <div class="field">
          <label for="area">Área</label>
          <select id="area"></select>
          <div class="error-msg" id="err-area">Seleccione un área</div>
        </div>

        <p class="section-title">Accesorios</p>

        <div class="checks-grid">
          <label class="check-item">
            <input type="checkbox" id="acc-mouse">
            <span>Mouse</span>
          </label>
          <label class="check-item">
            <input type="checkbox" id="acc-mousepad">
            <span>Mousepad</span>
          </label>
          <label class="check-item">
            <input type="checkbox" id="acc-ventilador">
            <span>Ventilador</span>
          </label>
        </div>

        <div class="section-title-row">
          <p class="section-title">Equipos</p>
          <div class="equipo-toggles">
            <label class="check-item"><input type="checkbox" id="tiene-laptop"><span>Laptop</span></label>
            <label class="check-item"><input type="checkbox" id="tiene-telefono"><span>Teléfono</span></label>
            <label class="check-item"><input type="checkbox" id="tiene-chip"><span>Chip</span></label>
          </div>
        </div>

        <div id="laptop-section" class="equipo-section disabled">
          <div class="field">
            <label>Serial y clave de la laptop</label>
            <div class="serial-row">
              <label class="phone-cargador" title="Cargador laptop">
                <input type="checkbox" id="cargador-laptop">
                Cargador
              </label>
              <input type="text" id="serial-laptop" placeholder="Serial de la laptop">
              <input type="text" id="clave" placeholder="Clave del equipo">
            </div>
          </div>
        </div>

        <div id="telefono-section" class="equipo-section disabled">
          <div class="field">
            <div class="phones-header">
              <span>IMEI 1</span>
              <span>IMEI 2</span>
              <span>PIN/Clave</span>
              <span>Cargador</span>
              <span></span>
            </div>
            <div class="phone-entries" id="phones-container"></div>
            <button type="button" class="btn-add" id="btn-add-phone">+ Agregar teléfono</button>
          </div>
        </div>

        <div id="chip-section" class="equipo-section disabled">
          <div class="field">
            <div class="chips-header">
              <span>Número</span>
              <span>Operadora</span>
              <span>Tipo</span>
              <span></span>
            </div>
            <div class="chip-entries" id="chips-container"></div>
            <button type="button" class="btn-add" id="btn-add-chip">+ Agregar chip</button>
          </div>
        </div>

        <p class="section-title">Otros</p>

        <div class="checks-grid">
          <label class="check-item has-data-personal">
            <input type="checkbox" id="datos-personales">
            <span>El colaborador tiene datos personales en el equipo</span>
          </label>
        </div>

        <div id="acciones-section" class="equipo-section disabled">
          <div class="field">
            <label for="acciones-correctivas">Acciones correctivas</label>
            <textarea id="acciones-correctivas" placeholder="Describa las acciones correctivas tomadas..."></textarea>
          </div>
        </div>

        <div class="field mt-md">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" placeholder="Observaciones adicionales..."></textarea>
        </div>

        <div class="submit-row">
          <button type="button" class="btn-reset" id="btn-reset">Limpiar</button>
          <button type="submit" class="btn-submit" id="btn-submit">Guardar registro</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/shared.js"></script>
  <script src="/js/form.js"></script>
</body>
</html>
