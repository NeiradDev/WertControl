<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registros — Barrido de Activos</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/lista.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Registros <span class="badge" id="count-badge">0</span></h1>
      <div class="header-actions">
        <a href="/api/registros/export" class="btn-link btn-export">Exportar Excel</a>
        <a href="/config.html" class="btn-link">Configuración</a>
        <a href="/" class="btn-link">+ Nuevo registro</a>
      </div>
    </header>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Buscar por nombre, cédula o área...">
      <select id="filter-area"></select>
    </div>

    <div id="list-container"></div>
  </div>

  <!-- Edit modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Editar registro</h2>
        <button class="btn-close" id="btn-close-modal">×</button>
      </div>

      <form id="edit-form" novalidate>
        <p class="section-title">Datos del colaborador</p>

        <div class="grid-2">
          <div class="field">
            <label for="e-nombre">Nombre</label>
            <input type="text" id="e-nombre" placeholder="Nombre completo">
            <div class="error-msg" id="e-err-nombre">Campo requerido</div>
          </div>
          <div class="field">
            <label for="e-cedula">Cédula</label>
            <input type="text" id="e-cedula" placeholder="10 dígitos" maxlength="10">
            <div class="error-msg" id="e-err-cedula">Debe tener exactamente 10 dígitos</div>
          </div>
        </div>

        <div class="field">
          <label for="e-area">Área</label>
          <select id="e-area"></select>
          <div class="error-msg" id="e-err-area">Seleccione un área</div>
        </div>

        <p class="section-title">Accesorios</p>

        <div class="checks-grid">
          <label class="check-item">
            <input type="checkbox" id="e-acc-mouse">
            <span>Mouse</span>
          </label>
          <label class="check-item">
            <input type="checkbox" id="e-acc-mousepad">
            <span>Mousepad</span>
          </label>
          <label class="check-item">
            <input type="checkbox" id="e-acc-ventilador">
            <span>Ventilador</span>
          </label>
        </div>

        <p class="section-title">Equipos</p>

        <div class="field">
          <label for="e-serial-laptop">Serial laptop</label>
          <div class="serial-row">
            <label class="phone-cargador" title="Cargador laptop">
              <input type="checkbox" id="e-cargador-laptop">
              Cargador
            </label>
            <input type="text" id="e-serial-laptop" placeholder="Serial de la laptop">
          </div>
        </div>

        <div class="field">
          <label for="e-clave">Clave</label>
          <input type="text" id="e-clave" placeholder="Clave del equipo">
        </div>

        <div class="field">
          <div class="phones-header">
            <span>Serial teléfono</span>
            <span>Chip teléfono</span>
            <span>Chip 2</span>
            <span>PIN/Clave</span>
            <span>Cargador</span>
            <span></span>
          </div>
          <div class="phone-entries" id="e-phones-container"></div>
          <button type="button" class="btn-add" id="e-btn-add-phone">+ Agregar teléfono</button>
        </div>

        <p class="section-title">Otros</p>

        <div class="checks-grid">
          <label class="check-item has-data-personal">
            <input type="checkbox" id="e-datos-personales">
            <span>El colaborador tiene datos personales en el equipo</span>
          </label>
        </div>

        <div class="field mt-md">
          <label for="e-observaciones">Observaciones</label>
          <textarea id="e-observaciones" placeholder="Observaciones adicionales..."></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel-edit" id="btn-cancel-edit">Cancelar</button>
          <button type="submit" class="btn-save-edit" id="btn-save-edit">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/shared.js"></script>
  <script src="/js/lista.js"></script>
</body>
</html>
